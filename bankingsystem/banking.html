<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="banking.css">
  </head>
  <body>

    <div class="main">  
      <div class="userLogin" id="userLogin">
        <form action="" method="GET"></form>
          <input type="text" placeholder="username" id="userName">
          <input type="password" placeholder="password" id="passWord">  
          <input type="button" value="login" id="loginUser" onclick="fetchData()">  
      </div>

      <div class="secondSec" id="secondSec">
        <div class="userBalance">
        <label for="userBalance" class="label">BALANCE</label>
          <div class="displayCurrBal">
            <p id="displayCurrBal">999999</p>
          </div>
      </div>

        <div class="mainControl">
          <h2 class="clientName" id="nameDis">Jefferson Yabut</h2>
          <input type="button" value="send cash" onclick="toThirdSec()">
          <input type="button" value="logout">
        </div>
      </div>



      <div class="thirdSec" id="thirdSec">
         <div class="inputAmount">
          <h2>Amount to send</h2>
          <input type="text" id="amountBalance" placeholder="value">

            <div class="identifySender">
              <label for="sendTo">to:</label>
              <input type="text" id="sendTo" placeholder="number or username" class="sendTo">
            </div>
          </div>
         <div class="sendBtn">
          <input type="button" value="send" id="sendBtn">
         </div>
      </div>  




    </div>
    



    <script src="banking.js"></script>
  </body>
</html>
