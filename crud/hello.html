<!DOCTYPE html>
<html lang="en">
  <head>
    <title>todolist</title>
    <link rel="stylesheet" href="hello.css">
  </head> 
  <body>  


    <div class="main">

      <div class="homePage" id="homePage">
         <input type="button" value="create" onclick="toCreateTab()">
         <input type="button" value="search" onclick="toSearchTab()">
      </div>



      <div class="createObject" id="createObject">
        <div class="fullName">
        <input type="text" placeholder="first name" id="firstName" class="firstName" required>
        <input type="text" placeholder="last name" id="lastName" class="lastName" required>
        </div>
        <input type="text" placeholder="number" id="userNumber" class="userNumber">
        <div class="crudBtn">
        <input type="button" value="create" onclick="createUser()">
        <input type="button" value="search" onclick="searchTab()">
        </div>
      </div>




  
      <div class="search" id="searchTab">
        <input type="text" placeholder="enter artist" id="user">
        <div class="searchBtn">
        <input type="button" value="search" class="searchBtn" onclick="searchUser()">
        <input type="button" value="home" onclick="homePage()">
        </div>
      </div>




      <div class="cardBox" id="cardBox">
        <div class="personDetails">
          <h2>first name</h2>
          <p id="first_name">Jefferson</p>
          <h2>last name</h2>
          <p id="last_name">Yabut</p>
          <h2>number</h2>
          <p id="contact_number">09917348466</p>
        </div>
        <div class="submitDlt">
        <input type="button" value="delete" onclick="deleteUser()">
        <input type="button" value="update" onclick="updateTab()">
        <input type="button" value="back" onclick="prevPage()">
        </div>
      </div>


      <div id="updateSection" class="updateSection">
        <div class="userUi">
        <input type="text" value="first name" id="thisName" class="updt">
        <input type="text" value="last name" id="thisLastName" class="updt">
        <input type="text" value="number" id="user_number" class="updt">
      </div>
        <input type="button" value="update" onclick="updateUser()">
      </div>



    </div>





    <script src="hello.js">
    </script>
  </body>
  </html>
