<!DOCTYPE html>
<html lang="en">
  <head>
    <title>loginform</title>
    <meta name="viewport" content="width=device-width, initial-scale = 1.0">
    <link rel="stylesheet" href="login.css">
  </head> 
  <body>  


    <div class="main" id="main"> 

      <div class="signUp" id="signUp"> 
        <input type="text" placeholder="username" class="input" id="firstName" required>  
        <input type="password" placeholder="password" class="input" id="lastName">  
        <input type="button" value="Sign Up" id="submit" class="submitBtn" onclick="signUp()">
      </div>



      <div class="login" id="login">
        <input type="text" placeholder="username" class="username" id="username">  
        <input type="password" placeholder="password" class="password" id="password">  
        <input type="button" value="login" id="submit" class="loginBtn" onclick="login()">
      </div>
  

    </div>






    <script src="login.js">
    </script>
  </body>
  </html>
